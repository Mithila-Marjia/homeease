<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Provider sign up — HomeEase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/global.css" />
  </head>
  <body class="auth-page">
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand brand--homeease" href="../customer/index.html">HomeEase</a>
        <div class="header-actions">
          <a class="btn btn--ghost" href="signin.html">Provider Sign In</a>
        </div>
      </div>
    </header>

    <main class="auth-main">
      <div class="card auth-card auth-card--wide">
        <div class="auth-logo">
          <a class="brand brand--homeease" href="../customer/index.html">HomeEase</a>
        </div>
        <h1 class="auth-title">Register as a provider</h1>
        <p class="auth-sub">After approval, add services and choose a category for each listing.</p>

        <p class="auth-footer-text" data-auth-error hidden style="color: #b91c1c; margin-bottom: 0.75rem"></p>

        <form action="#" method="post" data-auth-signup-provider>
          <div class="field">
            <label for="name">Full name</label>
            <input
              class="input input--pill"
              type="text"
              id="name"
              name="name"
              placeholder="Md. Rafiqul Islam"
              required
              autocomplete="name"
            />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input
              class="input input--pill"
              type="email"
              id="email"
              name="email"
              placeholder="contact@yourbusiness.com.bd"
              required
              autocomplete="email"
            />
          </div>
          <div class="field">
            <label for="phone">Phone number</label>
            <input
              class="input input--pill"
              type="tel"
              id="phone"
              name="phone"
              placeholder="01819-876543"
              required
              autocomplete="tel"
            />
          </div>
          <div class="field">
            <label for="experience">Experience (years)</label>
            <input
              class="input input--pill"
              type="number"
              id="experience"
              name="experience"
              min="0"
              max="60"
              placeholder="e.g. 5"
              required
            />
          </div>
          <div class="field">
            <label id="docs-label" for="providerLicenseFiles">Licenses &amp; insurance (PDF or images)</label>
            <p style="margin: 0 0 0.5rem; font-size: 0.8125rem; color: var(--color-text-muted)">
              Up to 5 files, 10 MB each. Stored securely after you register.
            </p>
            <input
              class="sr-only"
              type="file"
              id="providerLicenseFiles"
              name="license_files"
              accept=".pdf,application/pdf,image/jpeg,image/png,image/webp"
              multiple
            />
            <div
              class="upload-zone"
              data-license-upload-zone
              role="button"
              tabindex="0"
              aria-labelledby="docs-label"
            >
              Click or drag files here to upload
            </div>
            <p data-license-file-list style="margin: 0.5rem 0 0; font-size: 0.8125rem; color: var(--color-text-muted)"></p>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input
              class="input input--pill"
              type="password"
              id="password"
              name="password"
              required
              minlength="8"
              autocomplete="new-password"
            />
          </div>
          <div class="field">
            <label for="password2">Confirm password</label>
            <input
              class="input input--pill"
              type="password"
              id="password2"
              name="password2"
              required
              minlength="8"
              autocomplete="new-password"
            />
          </div>
          <button type="submit" class="btn btn--primary btn--block btn--lg">Register as Provider</button>
        </form>

        <p class="auth-footer-text">
          Already registered?
          <a href="signin.html">Sign in</a>
        </p>
      </div>
    </main>

    <footer class="site-footer" style="margin-top: 0">
      <div class="container footer-bar" style="border-top: none; padding-top: 0">
        <span>© 2026 HomeEase</span>
        <a href="../customer/index.html">Customer site</a>
      </div>
    </footer>
    <script src="../assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-init.js"></script>
    <script src="../assets/js/auth-provider.js"></script>
  </body>
</html>
