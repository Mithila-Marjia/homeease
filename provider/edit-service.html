<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit service — HomeEase Provider</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/global.css" />
  </head>
  <body data-homeease-guard="provider">
    <div class="sidebar-backdrop" data-sidebar-backdrop aria-hidden="true"></div>
    <div class="dashboard">
      <aside class="sidebar" data-sidebar aria-label="Provider navigation">
        <div class="sidebar__brand">
          <strong>Provider Portal</strong>
          <small>HomeEase</small>
        </div>
        <div class="sidebar__profile">
          <img class="avatar avatar--sm" src="../assets/images/avatar-2.svg" alt="" width="36" height="36" data-homeease-profile-avatar referrerpolicy="no-referrer" />
          <div>
            <strong data-homeease-profile-name>Provider</strong>
            <span>Verified</span>
          </div>
        </div>
        <nav class="nav-list">
          <a href="dashboard.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="9" rx="1" />
              <rect x="14" y="3" width="7" height="5" rx="1" />
              <rect x="14" y="12" width="7" height="9" rx="1" />
              <rect x="3" y="16" width="7" height="5" rx="1" />
            </svg>
            Dashboard
          </a>
          <a class="is-active" href="services.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            My services
          </a>
          <a href="bookings.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <path d="M16 2v4M8 2v4M3 10h18" />
            </svg>
            Bookings
          </a>
          <a href="earnings.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
            </svg>
            Earnings
          </a>
          <a href="notifications.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />
            </svg>
            Notifications
          </a>
          <a href="profile.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Profile
          </a>
        </nav>
        <div class="sidebar__footer">
          <a href="../customer/index.html">Customer site</a>
        </div>
      </aside>

      <div class="dashboard__main">
        <div class="admin-topbar">
          <div class="container admin-topbar__inner" style="width: 100%; max-width: none; margin: 0; padding-inline: 1.25rem">
            <button type="button" class="nav-toggle" data-sidebar-toggle aria-label="Open menu">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
            <a class="brand brand--homeease" href="../customer/index.html" style="font-size: 0.95rem">HomeEase</a>
            <div class="dashboard-top__actions" style="margin-left: auto; display: flex; align-items: center; gap: 0.35rem">
              <a class="icon-btn" href="notifications.html" aria-label="Notifications" style="position: relative">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />
                </svg>
                <span
                  data-homeease-notifications-badge
                  style="
                    display: none;
                    position: absolute;
                    top: 4px;
                    right: 4px;
                    min-width: 1rem;
                    height: 1rem;
                    padding: 0 0.2rem;
                    background: #ef4444;
                    color: #fff;
                    border-radius: 99px;
                    font-size: 0.65rem;
                    line-height: 1rem;
                    font-weight: 700;
                  "
                ></span>
              </a>
              <button type="button" class="icon-btn" data-provider-signout aria-label="Log out">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div class="dashboard-content container" style="width: 100%; max-width: none; margin: 0">
          <div class="dashboard-top">
            <div>
              <p style="margin: 0 0 0.5rem">
                <a href="services.html" class="link-arrow" style="font-size: 0.875rem">← Back to my services</a>
              </p>
              <h1 style="margin-bottom: 0.35rem">Edit service</h1>
              <p style="margin: 0; color: var(--color-text-muted); max-width: 640px">
                Update pricing, description, category, or replace the listing image.
              </p>
            </div>
          </div>

          <section class="card panel" style="margin-top: 1rem">
            <form data-provider-edit-service class="field-grid" style="display: grid; gap: 0.75rem; max-width: 560px; margin-top: 0.5rem">
              <p data-provider-service-error hidden style="color: #b91c1c; margin: 0; font-size: 0.875rem"></p>
              <div class="field" style="margin: 0">
                <label for="svcTitle">Title</label>
                <input class="input input--pill" id="svcTitle" type="text" required placeholder="e.g. Split AC service (Gulshan)" />
              </div>
              <div class="field" style="margin: 0">
                <label for="svcSlug">URL slug (optional)</label>
                <input class="input input--pill" id="svcSlug" type="text" placeholder="Leave blank — auto from title" />
              </div>
              <div class="field" style="margin: 0">
                <label for="svcCategory">Category</label>
                <select class="select select--pill" id="svcCategory" required>
                  <option value="">Loading categories…</option>
                </select>
              </div>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem">
                <div class="field" style="margin: 0">
                  <label for="svcPrice">Base price (BDT)</label>
                  <input class="input input--pill" id="svcPrice" type="number" min="0" step="1" required />
                </div>
                <div class="field" style="margin: 0">
                  <label for="svcFee">Booking fee (BDT)</label>
                  <input class="input input--pill" id="svcFee" type="number" min="0" step="1" />
                </div>
              </div>
              <div data-service-image-preview hidden style="margin: 0"></div>
              <div class="field" style="margin: 0">
                <label for="svcImage">Replace image (optional)</label>
                <input class="input input--pill" id="svcImage" type="file" accept="image/jpeg,image/png,image/webp" />
              </div>
              <div class="field" style="margin: 0">
                <label for="svcDuration">Typical duration</label>
                <input class="input input--pill" id="svcDuration" type="text" placeholder="e.g. 2–3 ঘণ্টা" />
              </div>
              <div class="field" style="margin: 0">
                <label for="svcDesc">Description</label>
                <textarea class="textarea" id="svcDesc" rows="3" placeholder="What’s included, parts/labour, and what the customer should keep ready."></textarea>
              </div>
              <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center">
                <button type="submit" class="btn btn--primary">Save changes</button>
                <a class="btn btn--outline" href="services.html">Cancel</a>
              </div>
            </form>
          </section>
        </div>
      </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-init.js"></script>
    <script src="../assets/js/money-bdt.js"></script>
    <script src="../assets/js/provider-core.js"></script>
    <script src="../assets/js/dashboard-guard.js"></script>
    <script src="../assets/js/notifications-ui.js"></script>
    <script src="../assets/js/provider-service-storage.js"></script>
    <script src="../assets/js/provider-edit-service.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
