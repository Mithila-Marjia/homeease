<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookings — HomeEase Provider</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/global.css" />
  </head>
  <body data-homeease-guard="provider">
    <div class="sidebar-backdrop" data-sidebar-backdrop aria-hidden="true"></div>
    <div class="dashboard">
      <aside class="sidebar" data-sidebar aria-label="Provider navigation">
        <div class="sidebar__brand">
          <strong>Provider Portal</strong>
          <small>HomeEase</small>
        </div>
        <div class="sidebar__profile">
          <img class="avatar avatar--sm" src="../assets/images/avatar-2.svg" alt="" width="36" height="36" />
          <div>
            <strong data-homeease-profile-name>Provider</strong>
            <span>Verified</span>
          </div>
        </div>
        <nav class="nav-list">
          <a href="dashboard.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="9" rx="1" />
              <rect x="14" y="3" width="7" height="5" rx="1" />
              <rect x="14" y="12" width="7" height="9" rx="1" />
              <rect x="3" y="16" width="7" height="5" rx="1" />
            </svg>
            Dashboard
          </a>
          <a href="services.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            My services
          </a>
          <a class="is-active" href="bookings.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <path d="M16 2v4M8 2v4M3 10h18" />
            </svg>
            Bookings
          </a>
          <a href="earnings.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
            </svg>
            Earnings
          </a>
          <a href="notifications.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />
            </svg>
            Notifications
          </a>
          <a href="profile.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Profile
          </a>
        </nav>
        <div class="sidebar__footer">
          <a href="../customer/index.html">Customer site</a>
        </div>
      </aside>

      <div class="dashboard__main">
        <div class="admin-topbar">
          <div class="container admin-topbar__inner" style="width: 100%; max-width: none; margin: 0; padding-inline: 1.25rem">
            <button type="button" class="nav-toggle" data-sidebar-toggle aria-label="Open menu">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
            <a class="brand brand--homeease" href="../customer/index.html" style="font-size: 0.95rem">HomeEase</a>
            <div class="dashboard-top__actions" style="margin-left: auto; display: flex; align-items: center; gap: 0.35rem">
              <a class="icon-btn" href="notifications.html" aria-label="Notifications" style="position: relative">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />
                </svg>
                <span
                  data-homeease-notifications-badge
                  style="
                    display: none;
                    position: absolute;
                    top: 4px;
                    right: 4px;
                    min-width: 1rem;
                    height: 1rem;
                    padding: 0 0.2rem;
                    background: #ef4444;
                    color: #fff;
                    border-radius: 99px;
                    font-size: 0.65rem;
                    line-height: 1rem;
                    font-weight: 700;
                  "
                ></span>
              </a>
              <button type="button" class="icon-btn" data-provider-signout aria-label="Log out">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div class="dashboard-content container" style="width: 100%; max-width: none; margin: 0">
          <div class="dashboard-top">
            <div>
              <h1 style="margin-bottom: 0.35rem">Bookings</h1>
              <p style="margin: 0; color: var(--color-text-muted); max-width: 640px">
                Update status as jobs progress. You cannot change price or platform fee (set at booking time).
              </p>
            </div>
          </div>

          <section class="card panel" style="margin-top: 1rem" data-provider-bookings-page>
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr>
                    <th>When</th>
                    <th>Service</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Platform fee</th>
                    <th>Status</th>
                    <th>Notes</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td colspan="7" style="padding: 1rem; color: var(--color-text-muted)">Loading…</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-init.js"></script>
    <script src="../assets/js/money-bdt.js"></script>
    <script src="../assets/js/provider-core.js"></script>
    <script src="../assets/js/dashboard-guard.js"></script>
    <script src="../assets/js/notifications-ui.js"></script>
    <script src="../assets/js/provider-bookings-page.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
