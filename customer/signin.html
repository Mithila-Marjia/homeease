<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — HomeEase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/global.css" />
  </head>
  <body class="auth-page">
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand brand--homeease" href="index.html">HomeEase</a>
        <div class="header-actions">
          <a class="btn btn--ghost" href="../provider/signin.html">Provider login</a>
          <a class="btn btn--primary" href="signup.html">Get Started</a>
        </div>
      </div>
    </header>

    <main class="auth-main">
      <div class="card auth-card">
        <div class="auth-logo">
          <a class="brand brand--homeease" href="index.html">HomeEase</a>
        </div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to manage home service bookings and messages.</p>

        <p class="auth-footer-text" data-auth-error hidden style="color: #b91c1c; margin-bottom: 0.75rem"></p>

        <form action="#" method="post" data-auth-signin-customer>
          <div class="field">
            <label for="email">Email</label>
            <input
              class="input input--pill"
              type="email"
              id="email"
              name="email"
              placeholder="rahim@gmail.com"
              required
              autocomplete="email"
            />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input
              class="input input--pill"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              minlength="8"
              autocomplete="current-password"
            />
          </div>
          <div class="auth-links">
            <span></span>
            <a href="#">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn--primary btn--block btn--lg">Sign In</button>
        </form>

        <p class="auth-footer-text">
          Don’t have an account?
          <a href="signup.html">Sign up</a>
        </p>
      </div>
    </main>

    <footer class="site-footer" style="margin-top: 0">
      <div class="container footer-bar" style="border-top: none; padding-top: 0">
        <span>© 2026 HomeEase</span>
        <a href="index.html">Back to home</a>
      </div>
    </footer>
    <script src="../assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-init.js"></script>
    <script src="../assets/js/auth-errors.js"></script>
    <script src="../assets/js/auth-customer.js"></script>
  </body>
</html>
