<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My profile — HomeEase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/global.css" />
  </head>
  <body class="page-browse" data-customer-account="profile">
    <header class="site-header site-header--browse">
      <div class="container site-header__inner">
        <a class="brand brand--homeease" href="index.html">HomeEase</a>
        <nav class="browse-header-nav" aria-label="Browse">
          <a href="categories.html">Categories</a>
          <a href="bookings.html">Bookings</a>
          <a href="index.html">Home</a>
        </nav>
        <div class="header-actions">
          <div data-customer-auth-guest style="display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap">
            <a class="btn btn--ghost btn--signin-browse" href="signin.html">Sign In</a>
            <a class="btn btn--primary btn--browse-cta" href="signup.html">Get Started</a>
          </div>
          <div data-customer-auth-user hidden style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap">
            <a href="profile.html" class="btn btn--ghost btn--sm">Profile</a>
            <a href="bookings.html" class="btn btn--ghost btn--sm">Bookings</a>
            <span data-customer-greeting style="font-size: 0.875rem; color: var(--color-text-muted)"></span>
            <button type="button" class="btn btn--ghost btn--sm" data-customer-signout>Sign out</button>
          </div>
        </div>
      </div>
    </header>

    <main class="browse-main">
      <div class="container" style="max-width: 560px">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="index.html">Home</a>
          <span class="breadcrumb__sep" aria-hidden="true">/</span>
          <span class="breadcrumb__current">Profile</span>
        </nav>

        <p data-customer-account-loading style="color: var(--color-text-muted); margin: 1rem 0">Loading…</p>

        <div data-customer-account-content hidden>
          <header class="browse-page-header" style="margin-bottom: 1.25rem">
            <h1 class="browse-page-header__title">Your profile</h1>
            <p class="browse-page-header__lead">Update how we reach you for bookings and reminders.</p>
          </header>

          <section class="card panel">
            <p data-customer-profile-error hidden style="color: #b91c1c; margin: 0 0 0.75rem; font-size: 0.875rem"></p>
            <p data-customer-profile-success hidden style="color: var(--color-accent); margin: 0 0 0.75rem; font-size: 0.875rem"></p>

            <form data-customer-profile-form class="field-grid" style="display: grid; gap: 0.75rem">
              <div class="field" style="margin: 0">
                <label for="profileFullName">Full name</label>
                <input class="input input--pill" id="profileFullName" type="text" required autocomplete="name" />
              </div>
              <div class="field" style="margin: 0">
                <label for="profilePhone">Phone</label>
                <input class="input input--pill" id="profilePhone" type="tel" autocomplete="tel" placeholder="e.g. 01712-345678" />
              </div>
              <div class="field" style="margin: 0">
                <span class="text-muted" style="font-size: 0.8125rem">Email</span>
                <p id="profileEmail" style="margin: 0.35rem 0 0; font-weight: 500">—</p>
                <span class="text-muted" style="font-size: 0.75rem">Email is managed through your sign-in provider.</span>
              </div>
              <button type="submit" class="btn btn--primary" style="justify-self: start">Save changes</button>
            </form>
          </section>
        </div>
      </div>
    </main>

    <footer class="site-footer site-footer--browse">
      <div class="container footer-bar" style="border-top: none; padding: 1.5rem 0">
        <span>© 2026 HomeEase</span>
        <a href="index.html">Home</a>
      </div>
    </footer>
    <script src="../assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-init.js"></script>
    <script src="../assets/js/money-bdt.js"></script>
    <script src="../assets/js/customer-site.js"></script>
    <script src="../assets/js/customer-account.js"></script>
  </body>
</html>
