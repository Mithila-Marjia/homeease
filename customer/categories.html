<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All categories — HomeEase</title>
    <meta
      name="description"
      content="Browse HomeEase home service categories: electrical, plumbing, HVAC, landscaping, and deep cleaning."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/global.css" />
  </head>
  <body class="page-browse">
    <header class="site-header site-header--browse">
      <div class="container site-header__inner">
        <a class="brand brand--homeease" href="index.html">HomeEase</a>
        <div class="customer-area-inline customer-area-inline--browse">
          <label class="sr-only" for="customerAreaBrowse">Service area</label>
          <select id="customerAreaBrowse" data-customer-area-select class="deliver-select deliver-select--browse" aria-label="Service area"></select>
        </div>
        <nav class="browse-header-nav" aria-label="Browse">
          <a href="categories.html" aria-current="page">Categories</a>
          <a href="bookings.html">Bookings</a>
          <a href="index.html">Home</a>
        </nav>
        <div class="header-actions">
          <div data-customer-auth-guest style="display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap">
            <a class="btn btn--ghost btn--signin-browse" href="signin.html">Sign In</a>
            <a class="btn btn--primary btn--browse-cta" href="signup.html">Get Started</a>
          </div>
          <div data-customer-auth-user hidden style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap">
            <a href="profile.html" class="btn btn--ghost btn--sm">Profile</a>
            <a href="bookings.html" class="btn btn--ghost btn--sm">Bookings</a>
            <span data-customer-greeting style="font-size: 0.875rem; color: var(--color-text-muted)"></span>
            <button type="button" class="btn btn--ghost btn--sm" data-customer-signout>Sign out</button>
          </div>
        </div>
      </div>
    </header>

    <main class="browse-main">
      <div class="container">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="index.html">Home</a>
          <span class="breadcrumb__sep" aria-hidden="true">/</span>
          <span class="breadcrumb__current">All categories</span>
        </nav>

        <header class="browse-page-header">
          <h1 class="browse-page-header__title">Browse home services</h1>
          <p class="browse-page-header__lead">
            Choose a category to see popular jobs, upfront pricing guides, and book a verified pro on HomeEase.
          </p>
        </header>

        <div class="categories-grid" data-customer-categories-grid></div>
      </div>
    </main>

    <footer class="site-footer site-footer--browse">
        <div class="container footer-bar" style="border-top: none; padding: 1.5rem 0">
        <span>© 2026 HomeEase</span>
        <a href="index.html">Back to home</a>
      </div>
    </footer>
    <script src="../assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-init.js"></script>
    <script src="../assets/js/customer-site.js"></script>
  </body>
</html>
